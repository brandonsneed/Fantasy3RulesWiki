<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Rules Reference — WFB3 Wiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #111111;
    --bg2:         #181818;
    --bg3:         #1f1f1f;
    --border:      #2c2c2c;
    --border2:     #3a3a3a;
    --border-hard: #555555;
    --accent:      #ffffff;
    --accent-dim:  #888888;
    --accent-faint:#444444;
    --text:        #e8e8e8;
    --text-dim:    #999999;
    --text-faint:  #555555;
    --red:         #cc0000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
    line-height: 1.65;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ──────────────────────────────────────────────── */
  #sidebar {
    width: 230px;
    min-height: 100vh;
    background: var(--bg2);
    border-right: 1px solid var(--border2);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    flex-shrink: 0;
  }

  .sidebar-logo {
    padding: 22px 18px 16px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .sidebar-logo .brand {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .sidebar-logo .sub {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding-top: 6px;
    border-top: 1px solid var(--border2);
  }

  .sidebar-back {
    display: block;
    margin: 12px 14px 4px;
    padding: 6px 12px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-faint);
    border: 1px solid var(--border);
    border-radius: 2px;
    text-decoration: none;
    text-align: center;
    transition: all .15s;
  }
  .sidebar-back:hover { color: var(--text-dim); border-color: var(--border2); }

  .toc-heading {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding: 14px 18px 6px;
  }

  #sidebar-toc { padding: 0 0 24px; }
  #sidebar-toc a {
    display: block;
    padding: 4px 18px 4px 22px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: all .12s;
  }
  #sidebar-toc a:hover { color: var(--text-dim); border-left-color: var(--border-hard); }
  #sidebar-toc a.active { color: var(--text); border-left-color: var(--text); background: rgba(255,255,255,.03); }
  #sidebar-toc a.toc-sub {
    padding-left: 30px;
    font-size: 9px;
    color: var(--text-faint);
  }

  /* ── Top bar ──────────────────────────────────────────────── */
  #topbar {
    position: fixed;
    top: 0; left: 230px; right: 0;
    height: 46px;
    background: var(--bg);
    border-bottom: 2px solid var(--border2);
    display: flex;
    align-items: center;
    padding: 0 36px;
    z-index: 50;
    gap: 10px;
  }
  .breadcrumb {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }
  .breadcrumb .sep { color: var(--text-faint); margin: 0 8px; }
  .breadcrumb .current { color: var(--text); }
  .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-dim);
    transition: all .2s;
  }
  .btn:hover { border-color: var(--accent-dim); color: var(--accent); }
  .btn-primary { background: rgba(255,255,255,.06); border-color: var(--border-hard); color: var(--text); }
  .btn-primary:hover { background: rgba(255,255,255,.10); border-color: var(--text); }

  /* ── Main content ─────────────────────────────────────────── */
  #main {
    margin-left: 230px;
    padding-top: 46px;
    flex: 1;
    min-height: 100vh;
  }

  #content {
    padding: 48px 60px 80px;
    max-width: 1100px;
  }

  /* ── Two-column layout: body + TOC ───────────────────────── */
  .sr-layout {
    display: grid;
    grid-template-columns: 1fr 200px;
    gap: 48px;
    align-items: start;
  }

  .sr-body { min-width: 0; }

  /* ── In-page sticky TOC ───────────────────────────────────── */
  .sr-toc {
    position: sticky;
    top: 68px;
    align-self: start;
    max-height: calc(100vh - 90px);
    overflow-y: auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px;
  }

  .sr-toc-title {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 10px;
  }

  .sr-toc a {
    display: block;
    color: var(--text-dim);
    text-decoration: none;
    padding: 3px 0 3px 8px;
    border-left: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    transition: all .15s;
    cursor: pointer;
  }
  .sr-toc a:hover { color: var(--text); border-left-color: var(--text-dim); }
  .sr-toc a.active { color: var(--text); border-left-color: var(--text); background: rgba(255,255,255,.03); }

  /* ── Page header ──────────────────────────────────────────── */
  .page-header {
    margin-bottom: 44px;
  }
  .page-header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--text);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border-hard);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .page-header .subtitle {
    font-size: 15px;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.5;
  }

  /* ── Sections ─────────────────────────────────────────────── */
  .sr-section {
    margin-bottom: 52px;
    padding-bottom: 52px;
    border-bottom: 1px solid var(--border);
  }
  .sr-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

  .sr-section-heading {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 20px;
    padding: 9px 14px;
    border-left: 3px solid var(--accent);
    background: rgba(255,255,255,0.04);
    scroll-margin-top: 68px;
  }

  /* ── Rule entries ─────────────────────────────────────────── */
  .sr-rule-entry {
    border-bottom: 1px solid var(--border);
    padding: 18px 0;
  }
  .sr-rule-entry:last-child { border-bottom: none; padding-bottom: 0; }

  .sr-rule-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.06em;
    margin-bottom: 5px;
    scroll-margin-top: 68px;
  }

  .sr-rule-short {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.45;
    padding-left: 12px;
    border-left: 2px solid var(--border2);
  }

  .sr-rule-text {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 0;
  }

  /* ── Racial rule entries (callout box) ────────────────────── */
  .sr-racial-entry {
    border: 1px solid var(--border2);
    border-left: 3px solid #6a8a6a;
    background: rgba(106,138,106,0.04);
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .sr-racial-entry:last-child { margin-bottom: 0; }

  .sr-racial-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    scroll-margin-top: 68px;
  }

  .sr-racial-short {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 10px;
    line-height: 1.45;
  }

  .sr-racial-text {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.65;
  }

  /* ── Mount rules table ────────────────────────────────────── */
  .sr-mount-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin-top: 4px;
  }
  .sr-mount-table thead tr {
    border-bottom: 2px solid var(--border-hard);
    background: rgba(255,255,255,0.05);
  }
  .sr-mount-table thead th {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    padding: 8px 12px;
    text-align: left;
  }
  .sr-mount-table thead th:first-child { width: 180px; }
  .sr-mount-table tbody tr { border-bottom: 1px solid var(--border); }
  .sr-mount-table tbody tr:last-child { border-bottom: none; }
  .sr-mount-table td {
    padding: 10px 12px;
    color: var(--text-dim);
    vertical-align: top;
    line-height: 1.55;
    font-size: 14px;
  }
  .sr-mount-table td:first-child {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    vertical-align: middle;
    width: 180px;
  }

  /* ── Weapon tables ────────────────────────────────────────── */
  .sr-weapon-subsection { margin-bottom: 28px; }
  .sr-weapon-subsection:last-child { margin-bottom: 0; }

  .sr-weapon-label {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-left: 10px;
    border-left: 2px solid var(--border-hard);
    margin-bottom: 12px;
  }

  .sr-weapon-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .sr-weapon-table thead tr {
    border-bottom: 2px solid var(--border-hard);
    background: rgba(255,255,255,0.05);
  }
  .sr-weapon-table thead th {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    padding: 7px 10px;
    text-align: left;
  }
  .sr-weapon-table thead th.centre { text-align: center; }
  .sr-weapon-table tbody tr { border-bottom: 1px solid var(--border); }
  .sr-weapon-table tbody tr:last-child { border-bottom: none; }
  .sr-weapon-table td {
    padding: 8px 10px;
    color: var(--text-dim);
    vertical-align: top;
    line-height: 1.5;
  }
  .sr-weapon-table td.weapon-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.04em;
    vertical-align: middle;
    white-space: nowrap;
    width: 180px;
  }
  .sr-weapon-table td.centre {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    vertical-align: middle;
  }

  /* ═══════════════════════════════════════════════════════════
     PRINT STYLES
     Two-column compact layout.
     "Print / Save PDF" button triggers window.print().
  ═══════════════════════════════════════════════════════════ */
  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; box-sizing: border-box; }
    @page { margin: 10mm 8mm; size: A4 portrait; }

    html, body {
      display: block !important;
      background: #fff !important; color: #111 !important;
      font-size: 7.5pt !important; line-height: 1.35;
      font-family: 'Crimson Pro', Georgia, serif !important;
      margin: 0; padding: 0;
      min-height: 0 !important; height: auto !important;
    }

    #sidebar, #topbar { display: none !important; }
    #main { margin-left: 0 !important; padding-top: 0 !important; display: block !important; }
    #content { padding: 0 !important; max-width: none !important; display: block !important; }

    /* ── Print page header ──────── */
    .page-header { margin-bottom: 5pt; column-span: all; }
    .page-header h1 {
      font-family: 'Cinzel', serif !important;
      font-size: 13pt; color: #000 !important;
      border-bottom: 1.5pt solid #111; padding-bottom: 3pt;
      letter-spacing: 0.06em; margin: 0; line-height: 1.2;
    }
    .page-header .subtitle { font-size: 7pt; color: #444 !important; margin: 2pt 0 0; font-style: italic; }

    /* ── Hide TOC, flatten layout ── */
    .sr-toc { display: none !important; }
    .sr-layout { display: block !important; }

    /* ── Two-column print layout ─── */
    #content-inner {
      column-count: 2;
      column-gap: 5mm;
      column-fill: auto;
    }

    /* ── Sections ───────────────── */
    .sr-section {
      break-inside: auto;
      border-bottom: 0.5pt solid #ccc !important;
      margin-bottom: 4pt; padding-bottom: 4pt;
    }
    .sr-section:last-child { border-bottom: none !important; margin-bottom: 0; padding-bottom: 0; }

    .sr-section-heading {
      font-family: 'Cinzel', serif !important;
      font-size: 8pt; color: #000 !important;
      background: #efefef !important;
      border-left: 2.5pt solid #111 !important;
      padding: 2pt 5pt; margin: 0 0 3pt;
      letter-spacing: 0.08em; line-height: 1.3;
      break-after: avoid;
    }

    /* ── Rule entries ────────────── */
    .sr-rule-entry {
      border-bottom: 0.4pt solid #ddd !important;
      padding: 3pt 0;
      break-inside: avoid;
    }
    .sr-rule-entry:last-child { border-bottom: none !important; }

    .sr-rule-name {
      font-family: 'Cinzel', serif !important;
      font-size: 7.5pt !important; color: #000 !important;
      margin-bottom: 1pt;
    }

    .sr-rule-short {
      font-size: 6.5pt !important; color: #444 !important;
      margin-bottom: 1.5pt;
      padding-left: 5pt;
      border-left: 1.5pt solid #bbb !important;
      line-height: 1.3;
    }

    .sr-rule-text {
      font-size: 6.5pt !important; color: #222 !important;
      line-height: 1.3;
    }

    /* ── Racial callout boxes ─────── */
    .sr-racial-entry {
      border: 0.5pt solid #bbb !important;
      border-left: 2pt solid #6a8a6a !important;
      background: #f8f8f8 !important;
      padding: 3pt 6pt;
      margin-bottom: 3pt;
      break-inside: avoid;
    }
    .sr-racial-name {
      font-family: 'Cinzel', serif !important;
      font-size: 7pt !important; color: #000 !important;
      margin-bottom: 1pt; letter-spacing: 0.06em;
    }
    .sr-racial-short { font-size: 6pt !important; color: #444 !important; margin-bottom: 1.5pt; line-height: 1.3; }
    .sr-racial-text { font-size: 6.5pt !important; color: #222 !important; line-height: 1.3; }

    /* ── Mount table ──────────────── */
    .sr-mount-table { font-size: 6pt !important; break-inside: auto; }
    .sr-mount-table thead th {
      background: #efefef !important; color: #000 !important;
      font-family: 'Cinzel', serif !important; font-size: 5.5pt !important;
      padding: 1.5pt 3pt !important; border-bottom: 0.5pt solid #aaa !important;
    }
    .sr-mount-table tbody tr { border-bottom: 0.4pt solid #ddd !important; }
    .sr-mount-table td { padding: 2pt 3pt !important; color: #222 !important; font-size: 6pt !important; line-height: 1.3; }
    .sr-mount-table td:first-child { color: #000 !important; font-size: 6pt !important; font-weight: 700; width: auto !important; white-space: nowrap; }

    /* ── Weapon tables ─────────────── */
    .sr-weapon-label {
      font-family: 'Cinzel', serif !important;
      font-size: 6.5pt !important; color: #222 !important;
      border-left: 1.5pt solid #999 !important;
      padding-left: 4pt; margin: 3pt 0 2pt;
      break-after: avoid;
    }
    .sr-weapon-table { font-size: 6pt !important; break-inside: auto; }
    .sr-weapon-table thead th {
      background: #efefef !important; color: #000 !important;
      font-family: 'Cinzel', serif !important; font-size: 5.5pt !important;
      padding: 1.5pt 3pt !important; border-bottom: 0.5pt solid #aaa !important;
    }
    .sr-weapon-table tbody tr { border-bottom: 0.4pt solid #ddd !important; }
    .sr-weapon-table td { padding: 2pt 3pt !important; color: #222 !important; font-size: 6pt !important; line-height: 1.3; }
    .sr-weapon-table td.weapon-name { color: #000 !important; font-weight: 700; white-space: nowrap; width: auto !important; }
    .sr-weapon-table td.centre { color: #000 !important; font-size: 6pt !important; }

    a { color: #000 !important; text-decoration: none !important; }
  }
</style>
</head>
<body>

<!-- ═══ SIDEBAR ════════════════════════════════════════════════ -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="brand">Warhammer<br>Fantasy Battle</div>
    <div class="sub">Third Edition · Rules Reference</div>
  </div>
  <a class="sidebar-back" href="index.html">← Wiki Index</a>
  <div class="toc-heading">Contents</div>
  <nav id="sidebar-toc"></nav>
</aside>

<!-- ═══ TOPBAR ═════════════════════════════════════════════════ -->
<div id="topbar">
  <div class="breadcrumb">
    <span>Reference</span>
    <span class="sep">›</span>
    <span class="current">Special Rules</span>
  </div>
  <div class="topbar-right">
    <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
  </div>
</div>

<!-- ═══ MAIN ════════════════════════════════════════════════════ -->
<div id="main">
  <div id="content">
    <div class="page-header">
      <h1>Special Rules Reference</h1>
      <p class="subtitle">Psychology, combat rules, special troop types, racial rules, bestiary abilities, mount rules, and weapon rules for Warhammer Fantasy Battle 3rd Edition.</p>
    </div>
    <div class="sr-layout">
      <div class="sr-body">
        <div id="content-inner">
          <!-- generated by buildPage() -->
        </div>
      </div>
      <aside class="sr-toc">
        <div class="sr-toc-title">Contents</div>
        <nav id="page-toc"></nav>
      </aside>
    </div>
  </div>
</div>

<script src="special-rules-data.js"></script>
<script>
(function() {

  /* ── Section render order & labels ────────────────────────────── */
  var SECTIONS = [
    { id: 'psychology',    label: 'Psychology',              category: 'Psychology',              type: 'rules' },
    { id: 'combat',        label: 'Combat Rules',            category: 'Combat',                  type: 'rules' },
    { id: 'deployment',    label: 'Deployment',              category: 'Deployment',              type: 'rules' },
    { id: 'special-troop', label: 'Special Troop Types',     category: 'Special Troop',           type: 'rules' },
    { id: 'special-unit',  label: 'Special Unit Rules',      category: 'Special Rule',            type: 'rules' },
    { id: 'racial',        label: 'Racial Rules',            category: 'Racial Rules',            type: 'racial' },
    { id: 'giant-races',   label: 'Bestiary — Giant Races',  category: 'Bestiary — Giant Races',  type: 'rules' },
    { id: 'unit-specific', label: 'Bestiary — Unit Specific',category: 'Bestiary — Unit Specific',type: 'rules' },
    { id: 'mounts',        label: 'Mount Rules',             category: 'Mount Rule',              type: 'mounts' },
    { id: 'weapons',       label: 'Weapon Rules',            category: null,                      type: 'weapons' },
  ];

  /* ── Helpers ───────────────────────────────────────────────────── */
  function el(tag, cls) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Section builders ──────────────────────────────────────────── */

  function buildRulesSection(entries) {
    var frag = document.createDocumentFragment();
    entries.forEach(function(pair) {
      var name = pair[0], rule = pair[1];
      var div = el('div', 'sr-rule-entry');
      var h4 = el('div', 'sr-rule-name');
      h4.id = 'rule-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      h4.textContent = name;
      div.appendChild(h4);
      if (rule.short) {
        var s = el('p', 'sr-rule-short');
        s.textContent = rule.short;
        div.appendChild(s);
      }
      if (rule.text) {
        var t = el('p', 'sr-rule-text');
        t.textContent = rule.text;
        div.appendChild(t);
      }
      frag.appendChild(div);
    });
    return frag;
  }

  function buildRacialSection(entries) {
    var frag = document.createDocumentFragment();
    entries.forEach(function(pair) {
      var name = pair[0], rule = pair[1];
      var div = el('div', 'sr-racial-entry');
      var h4 = el('div', 'sr-racial-name');
      h4.id = 'rule-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      h4.textContent = name;
      div.appendChild(h4);
      if (rule.short) {
        var s = el('p', 'sr-racial-short');
        s.textContent = rule.short;
        div.appendChild(s);
      }
      if (rule.text) {
        var t = el('p', 'sr-racial-text');
        t.textContent = rule.text;
        div.appendChild(t);
      }
      frag.appendChild(div);
    });
    return frag;
  }

  function buildMountsSection(entries) {
    var table = el('table', 'sr-mount-table');
    var thead = el('thead');
    thead.innerHTML = '<tr><th>Mount</th><th>Rules</th></tr>';
    table.appendChild(thead);
    var tbody = el('tbody');
    entries.forEach(function(pair) {
      var name = pair[0], rule = pair[1];
      var tr = el('tr');
      var td1 = el('td');
      td1.id = 'rule-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      td1.textContent = name.replace(/ Rules$/, '').replace(/ Magical Attacks$/, '');
      var td2 = el('td');
      td2.textContent = rule.text || rule.short || '';
      tr.appendChild(td1); tr.appendChild(td2);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;
  }

  function buildWeaponsSection() {
    var frag = document.createDocumentFragment();

    /* Separate missiles from H2H */
    var missiles = [], hth = [];
    var missileNames = ['Repeating Crossbow','Crossbow','Long Bow','Short Bow','Bow','Sling','Pistol','Blunderbuss','Throwing Weapons'];
    WFB3_WEAPON_RULES.forEach(function(w) {
      if (missileNames.indexOf(w.name) !== -1) missiles.push(w);
      else hth.push(w);
    });

    /* ── Missile table ── */
    var missileWrap = el('div', 'sr-weapon-subsection');
    var missileLabel = el('div', 'sr-weapon-label');
    missileLabel.textContent = 'Missile Weapons';
    missileWrap.appendChild(missileLabel);

    var mt = el('table', 'sr-weapon-table');
    mt.innerHTML = '<thead><tr>'
      + '<th>Weapon</th>'
      + '<th class="centre">Range</th>'
      + '<th class="centre">Str</th>'
      + '<th>Notes</th>'
      + '</tr></thead>';
    var mtb = el('tbody');
    missiles.forEach(function(w) {
      /* Parse range/str from rule text */
      var rangeM = w.rule.match(/Range\s+([\d″″]+)/);
      var strM   = w.rule.match(/Str(?:ength)?\s+(\d)/);
      var notes  = w.rule.replace(/Range\s+[\d″″]+[″″]?,?\s*/, '').replace(/Str(?:ength)?\s+\d\.?\s*/, '').replace(/^\.\s*/, '').trim();
      /* Clean up leading punctuation */
      notes = notes.replace(/^[.,;]\s*/, '');
      var tr = el('tr');
      tr.innerHTML = '<td class="weapon-name">' + esc(w.name) + '</td>'
        + '<td class="centre">' + esc(rangeM ? rangeM[1] + '″' : '—') + '</td>'
        + '<td class="centre">' + esc(strM  ? strM[1]            : '—') + '</td>'
        + '<td>' + esc(notes || '—') + '</td>';
      mtb.appendChild(tr);
    });
    mt.appendChild(mtb);
    missileWrap.appendChild(mt);
    frag.appendChild(missileWrap);

    /* ── H2H table ── */
    var hthWrap = el('div', 'sr-weapon-subsection');
    var hthLabel = el('div', 'sr-weapon-label');
    hthLabel.textContent = 'Hand-to-Hand Weapons';
    hthWrap.appendChild(hthLabel);

    var ht = el('table', 'sr-weapon-table');
    ht.innerHTML = '<thead><tr><th>Weapon</th><th>Rules</th></tr></thead>';
    var htb = el('tbody');
    hth.forEach(function(w) {
      var tr = el('tr');
      tr.innerHTML = '<td class="weapon-name">' + esc(w.name) + '</td>'
        + '<td>' + esc(w.rule) + '</td>';
      htb.appendChild(tr);
    });
    ht.appendChild(htb);
    hthWrap.appendChild(ht);
    frag.appendChild(hthWrap);

    return frag;
  }

  /* ── Main build ────────────────────────────────────────────────── */
  function buildPage() {
    var inner    = document.getElementById('content-inner');
    var sidebarToc = document.getElementById('sidebar-toc');
    var pageToc  = document.getElementById('page-toc');

    SECTIONS.forEach(function(sec) {

      /* Collect entries for this category */
      var entries = [];
      if (sec.type !== 'weapons') {
        Object.keys(WFB3_RULES).forEach(function(name) {
          var rule = WFB3_RULES[name];
          if (rule.category === sec.category) entries.push([name, rule]);
        });
      }
      if (entries.length === 0 && sec.type !== 'weapons') return;

      /* Section wrapper */
      var section = el('section', 'sr-section');
      section.id = 'sec-' + sec.id;

      /* Heading */
      var h3 = el('div', 'sr-section-heading');
      h3.textContent = sec.label;
      section.appendChild(h3);

      /* Body */
      if (sec.type === 'rules') {
        section.appendChild(buildRulesSection(entries));
      } else if (sec.type === 'racial') {
        section.appendChild(buildRacialSection(entries));
      } else if (sec.type === 'mounts') {
        section.appendChild(buildMountsSection(entries));
      } else if (sec.type === 'weapons') {
        section.appendChild(buildWeaponsSection());
      }

      inner.appendChild(section);

      /* Add to both TOCs */
      [sidebarToc, pageToc].forEach(function(tocEl) {
        var a = el('a');
        a.href = '#sec-' + sec.id;
        a.textContent = sec.label;
        a.onclick = function(e) {
          e.preventDefault();
          var target = document.getElementById('sec-' + sec.id);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        tocEl.appendChild(a);
      });
    });

    /* Scroll spy — syncs both TOCs */
    var allSections = document.querySelectorAll('.sr-section');
    var allTocLinks = document.querySelectorAll('#sidebar-toc a, #page-toc a');
    window.addEventListener('scroll', function() {
      var scrollY = window.scrollY + 80;
      var current = '';
      allSections.forEach(function(s) {
        if (s.offsetTop <= scrollY) current = s.id;
      });
      allTocLinks.forEach(function(a) {
        var href = a.getAttribute('href').replace('#', '');
        a.classList.toggle('active', href === current);
      });
    }, { passive: true });
  }

  document.addEventListener('DOMContentLoaded', buildPage);
})();
</script>
</body>
</html>
