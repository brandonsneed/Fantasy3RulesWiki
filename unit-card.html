<!DOCTYPE html>
<!--
═══════════════════════════════════════════════════════════════════════════════
  WFB3 UNIT CARD EDITOR — ARCHITECTURE & CALIBRATION NOTES
  For use by Claude in future sessions when transcribing army lists
═══════════════════════════════════════════════════════════════════════════════

  CARD TYPES: standard | warmachine | waraltar | handler | chariot | character
  Each has its own buildForm* and render* function pair.

  ── MACHINE STATS BAND — FLEXIBLE COLUMNS ──────────────────────────────────
  WM_STATS entries use { headers: [...], cols: [...] } to support variable
  column counts. Do NOT assume 4 columns.

  Current header sets:
    WM_STATS_HEADERS_4      → Range / Strength / Save Mod. / Wounds/Hit
    WM_STATS_HEADERS_STONE  → Range Min / Range Max / Template / Str / Save Mod. / Wnds/Hit
    WM_STATS_HEADERS_CANNON → Range / Str (first 12″) / Save Mod. / Wounds/Hit

  The renderer reads machineStats.statHeaders + machineStats.statCols directly,
  so adding a new header set requires no renderer changes — just a new constant
  and WM_STATS entries that reference it.

  Named machine variants (Skull Crusher, Man-Mangler, Lead Belcher, Orc Stone
  Thrower, etc.) have their own WM_STATS keys with army-list-specific base costs
  that may differ from the generic crew-size table.

  ── POINTS FORMULA NOTES ───────────────────────────────────────────────────
  Standard:     machine base + (race base + equipment × mult + 5 surcharge) × crew count
  Anomalies documented so far:
    • Orc Stone Thrower (3-crew): base=20 (not 15), crew=Orc+Light Armour, NO surcharge
    • War Altar: base=50 fixed, guards are free (no crew cost)
    • Lead Belcher Organ Gun: base=80 (not 60)
  Always verify new machines against the formula and document deviations in
  wa-points-formula in the wiki.

  ── ARMY LIST TRANSCRIPTION — ONGOING CALIBRATION ──────────────────────────
  As army lists are transcribed, edge cases WILL arise. Always update this
  editor during the same session — do not defer.

  Triggers and responses:
    New machine type / named variant
      → add to WM_STATS + wm-type <select> dropdown
    Machine stats band needs different columns
      → add a new WM_STATS_HEADERS_* constant, reference it in WM_STATS
    Points formula anomaly
      → document in wa-points-formula wiki page + handle in calculator
    New troop type not in RACE_PROFILES
      → add to RACE_PROFILES and both race <select> dropdowns
    New mount type not in MOUNT_PROFILES
      → add to MOUNT_PROFILES
    Options / subheading format not covered
      → extend the options UI (buildOptionForms) as needed
    New card layout required
      → add a new card type tab + buildForm* + render* pair

  ── CHARACTER CARD — FORMULA NOTES ─────────────────────────────────────────
  Points formula (ag-characters + WA override):
    Base ≤ 10:  char_base = race_base × (level + 1)
    Base > 10:  char_base = (10 × level) + race_base
  Equipment & mount added at FACE VALUE — no WFB multipliers (WA explicit override).
  Wizard surcharge: +30(L5), +30(L10), +75(L15), +135(L20), +210(L25)
    Validated: DE, WE, HE wizards all 78/118/203/303/418 (Elf 8 base).
    Human race wizards: 60/85/155/240/340 (Empire, Bretonnia, 5 base).
  Undead named types (Undead Hero, Liche, Vampire, Necromancer) use fixed
    lookup tables from WA Undead army list — formula does not apply.
  Standard (competitive) profile advances = roll 1 on each level table.
  Magic items cost comes out of character points allocation — tracked separately.
  Mount cost for characters: full face value added (not halved, not doubled).
    Riding animal rules (doubling) apply to UNITS not individual characters.

  ── KNOWN EDGE CASES ────────────────────────────────────────────────────────
  Dwarf War Engines aggregate card (WA Dwarf army list, p.XX)
    This is a single card covering all Dwarf war machine types collectively.
    It has NO profile table and NO stats band — each machine has its own
    separately priced entry listed at the bottom of the card.
    Approach: use War Machine card type with profile/stats left empty.
    The machine list (bolt-throwers, stone-throwers, cannon, organ guns,
    flame cannon, fire throwers with individual pts per model) goes in the
    flavour text field as an HTML table with dotted leaders, matching the
    source card layout. The "Units: up to 6 units of 1-4 engine models"
    line goes in the models field. Weapons/Armour flank the art as normal.
    Options: Light Armour +2, Heavy Armour +3 (any battery crew).

  ── RACE PROFILES ──────────────────────────────────────────────────────────
  RACE_PROFILES keyed by base cost string ("5", "8", etc.).
  Multiple races share the same key — the profile row label comes from the
  selected option text (now individual entries, not combined "A / B / C").
  Elite/levy modifiers in ELITE_MODS apply stat deltas on top of the base.

  ── MOUNT PROFILES ─────────────────────────────────────────────────────────
  MOUNT_PROFILES keyed by mount name string (eg "Warhorse", "Cold One").
  Selecting a mount on Standard card auto-adds a second profile row + shows
  "Mount: X" info row. Switching to None removes the auto-added row.

═══════════════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFB Unit Card Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   EDITOR CHROME
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111111; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif; color: #e8e8e8; }
.editor-topbar { background: #0d0d0d; border-bottom: 2px solid #3a3a3a; padding: 10px 24px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
.editor-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.18em; color: #e8e8e8; text-transform: uppercase; }
.card-type-tabs { display: flex; gap: 3px; margin-left: 12px; }
.card-type-tab { background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 2px; color: #666; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; cursor: pointer; transition: all 0.12s; }
.card-type-tab.active { background: #e8e8e8; border-color: #e8e8e8; color: #0d0d0d; }
.card-type-tab:hover:not(.active) { border-color: #e8e8e8; color: #e8e8e8; }
.topbar-btn { margin-left: auto; background: #e8e8e8; color: #0d0d0d; border: none; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 14px; cursor: pointer; border-radius: 2px; transition: background 0.15s; }
.topbar-btn:hover { background: #ffffff; }
.editor-main { display: flex; flex: 1; overflow: hidden; }
.form-panel { flex: 1; min-width: 0; background: #181818; border-right: 2px solid #3a3a3a; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.form-section { background: #1f1f1f; border: 1px solid #2c2c2c; border-radius: 3px; overflow: hidden; }
.form-section-title { background: #141414; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #e8e8e8; padding: 5px 10px; border-bottom: 1px solid #2c2c2c; }
.form-section-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
.form-field { display: flex; flex-direction: column; gap: 3px; }
.form-field label { font-size: 8px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #666666; }
.form-field input, .form-field textarea, .form-field select { background: #0d0d0d; border: 1px solid #3a3a3a; border-radius: 2px; color: #e8e8e8; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; padding: 4px 7px; outline: none; transition: border-color 0.15s; width: 100%; }
.form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: #e8e8e8; }
.form-field textarea { resize: vertical; min-height: 48px; line-height: 1.4; }
.form-field select option { background: #0d0d0d; }
.stat-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; }
.stat-grid-labels { display: grid; grid-template-columns: repeat(12, 1fr); gap: 3px; margin-bottom: 1px; }
.stat-label { text-align: center; font-size: 7px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: #666666; }
.stat-input { background: #0d0d0d; border: 1px solid #3a3a3a; border-radius: 2px; color: #e8e8e8; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; text-align: center; padding: 3px 1px; width: 100%; outline: none; }
.stat-input:focus { border-color: #e8e8e8; }
.machine-stat-grid { display: grid; gap: 3px; }
.machine-stat-grid-labels { display: grid; gap: 3px; margin-bottom: 1px; }
.machine-stat-input { background: #0d0d0d; border: 1px solid #3a3a3a; border-radius: 2px; color: #e8e8e8; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; text-align: center; padding: 3px 4px; width: 100%; outline: none; }
.machine-stat-input:focus { border-color: #e8e8e8; }
.profile-row-block { background: #161616; border: 1px solid #222222; border-radius: 2px; padding: 8px; display: flex; flex-direction: column; gap: 6px; position: relative; }
.profile-row-remove { position: absolute; top: 5px; right: 5px; background: #8b2020; color: #fff; border: none; border-radius: 50%; width: 14px; height: 14px; font-size: 10px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
.profile-row-remove:hover { background: #c0392b; }
.add-btn { background: none; border: 1px dashed #3a3a3a; border-radius: 2px; color: #555555; font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 8px; cursor: pointer; transition: border-color 0.15s, color 0.15s; width: 100%; text-align: center; }
.add-btn:hover { border-color: #e8e8e8; color: #e8e8e8; }

/* Collapsible section */
.form-section-collapsible .form-section-title {
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
}
.form-section-collapsible .form-section-title::after {
  content: '▶';
  font-size: 8px;
  color: #555;
  transition: transform 0.15s;
}
.form-section-collapsible.open .form-section-title::after {
  transform: rotate(90deg);
}
.form-section-collapsible .form-section-body {
  display: none;
}
.form-section-collapsible.open .form-section-body {
  display: flex;
}
.form-section-collapsible > div:not(.form-section-title):not(.form-section-body) {
  display: none;
}
.form-section-collapsible.open > div:not(.form-section-title):not(.form-section-body) {
  display: flex;
}
/* Two-col field row */
.form-field-row { display: flex; gap: 8px; }
.form-field-row .form-field { flex: 1; }
.option-group-block { background: #161616; border: 1px solid #222222; border-radius: 2px; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
.option-group-header { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
.option-group-header label { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #666666; flex-shrink: 0; }
.option-line-form { display: flex; gap: 5px; align-items: center; }
.option-line-form input { background: #0d0d0d; border: 1px solid #3a3a3a; border-radius: 2px; color: #e8e8e8; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; padding: 3px 6px; outline: none; }
.option-line-form input:focus { border-color: #e8e8e8; }
.option-line-form .opt-name { flex: 1; }
.option-line-form .opt-cost { width: 42px; text-align: center; }
.option-remove-btn { background: #8b2020; color: #fff; border: none; border-radius: 50%; width: 14px; height: 14px; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; flex-shrink: 0; }
.option-remove-btn:hover { background: #c0392b; }
.option-group-remove { background: #8b2020; color: #fff; border: none; border-radius: 2px; font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; cursor: pointer; margin-left: auto; }
.option-group-remove:hover { background: #c0392b; }
.preview-panel { flex: 1; min-width: 0; display: flex; align-items: flex-start; justify-content: center; padding: 40px 24px; overflow: auto; background: #cccccc; border-left: 2px solid #2c2c2c; }
#card-scale-outer { flex-shrink: 0; }
/* COMPANION SHEET */
.companion-sheet { background: #fff; border: 2px solid #1a1a1a; width: 270px; flex-shrink: 0; overflow: hidden; box-shadow: 3px 3px 0 #0005; display: flex; flex-direction: column; color: #1a1a1a; font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif; }
.companion-header { background: #1a1a1a; color: #fff; text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; padding: 4px 8px; flex-shrink: 0; }
.companion-section { padding: 6px 8px 8px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
.companion-section-title { font-size: 7.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: #555; margin-bottom: 4px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
.companion-body { font-size: 7.5px; line-height: 1.6; color: #222; white-space: pre-wrap; font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif; }
/* SHARED CARD STYLES */
.unit-card { background: #fff; border: 2px solid #1a1a1a; width: 340px; flex-shrink: 0; overflow: hidden; box-shadow: 3px 3px 0 #0005; display: flex; flex-direction: column; color: #1a1a1a; font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif; }
.card-header { background: #1a1a1a; color: #fff; text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; padding: 5px 8px 4px; font-family: 'Barlow Condensed', sans-serif; flex-shrink: 0; }
.card-header-gap { height: 3px; background: #fff; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
.profile-table { width: 100%; border-collapse: collapse; table-layout: fixed; flex-shrink: 0; border: 2px solid #1a1a1a; }
.profile-table th { background: #d8d8d8; border: 1px solid #999; text-align: center; font-size: 7.5px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; padding: 2px 1px; letter-spacing: 0.05em; text-transform: uppercase; }
.profile-table th.row-label-header { width: 88px; text-align: left; padding-left: 5px; white-space: normal; line-height: 1.2; vertical-align: middle; }
.profile-table td { border: 1px solid #bbb; text-align: center; font-size: 9px; font-family: 'Barlow Condensed', sans-serif; font-weight: 400; padding: 2px 1px; color: #1a1a1a; }
.profile-table td.row-label { text-align: left; font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding-left: 5px; background: #e6e6e6 !important; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-table tr:nth-child(even) td { background: #f6f6f6; }
.profile-table tr:nth-child(odd) td { background: #ffffff; }
/* STANDARD: middle */
.card-middle { display: flex; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; overflow: hidden; min-height: 160px; }
.card-art { width: 116px; flex-shrink: 0; border-right: 2px solid #1a1a1a; display: flex; align-items: center; justify-content: center; background: #fff; position: relative; cursor: pointer; overflow: hidden; }
.card-art input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.card-art-placeholder { width: 100%; height: 100%; min-height: 140px; border: 1px dashed #ccc; background: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; color: #bbb; font-size: 8px; font-style: italic; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; text-align: center; pointer-events: none; transition: background 0.15s, border-color 0.15s; }
.card-art:hover .card-art-placeholder { background: #f0f4ff; border-color: #99aadd; color: #99aadd; }
.card-art img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; pointer-events: none; }
.card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; max-width: 100%; box-sizing: border-box; }
.card-info-row { display: flex; align-items: baseline; border-bottom: 1px solid #ddd; padding: 3px 6px; width: 100%; flex-shrink: 0; }
.card-info-label { font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; color: #1a1a1a; flex-shrink: 0; }
.card-info-value { font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.03em; margin-left: 4px; color: #1a1a1a; white-space: normal; min-width: 0; word-break: break-word; }
.card-info-value-right { margin-left: auto; padding-left: 4px; font-family: 'Barlow Condensed', sans-serif; font-size: 8.5px; font-weight: 400; color: #1a1a1a; white-space: nowrap; flex-shrink: 0; }
.card-options { padding: 4px 6px 5px; flex: 1; overflow: hidden; min-width: 0; box-sizing: border-box; }
.options-heading { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; text-align: center; margin-bottom: 2px; color: #1a1a1a; }
.options-subheading { font-family: 'Barlow Condensed', sans-serif; font-size: 7.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; margin: 3px 0 1px; color: #1a1a1a; }
.option-line { display: flex; align-items: flex-end; font-family: 'Barlow Condensed', sans-serif; font-size: 7.5px; font-weight: 400; color: #1a1a1a; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.7; width: 100%; min-width: 0; }
.option-name { white-space: nowrap; flex-shrink: 0; margin-right: 2px; }
.option-dots { flex: 1; min-width: 4px; border-bottom: 1px dotted #aaa; margin-bottom: 4px; }
.option-dots::after { content: none; }
.option-cost { font-weight: 700; white-space: nowrap; flex-shrink: 0; min-width: 16px; text-align: right; }
/* WAR MACHINE: bottom weapons/armour band */
.card-wm-footer { display: flex; border-top: 2px solid #1a1a1a; flex-shrink: 0; }
.card-wm-footer-cell { flex: 1; padding: 4px 8px 5px; }
.card-wm-footer-cell + .card-wm-footer-cell { border-left: 1px solid #1a1a1a; }
.card-wm-footer-label { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #1a1a1a; display: block; }
.card-wm-footer-value { font-family: 'Barlow Condensed', sans-serif; font-size: 9px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.04em; color: #1a1a1a; display: block; }
/* WAR MACHINE: large models/points display */
.card-wm-mid { display: flex; border-top: 1px solid #1a1a1a; overflow: hidden; flex-shrink: 0; }
.card-wm-mid-left { flex: 1; padding: 5px 8px; border-right: 1px solid #ddd; }
.card-wm-mid-right { flex: 1; padding: 5px 8px; text-align: right; }
.card-wm-mid-label { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #1a1a1a; display: block; }
.card-wm-mid-value { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #1a1a1a; display: block; }

/* WAR MACHINE: machine stats band */
.machine-stats-band { border: 2px solid #1a1a1a; border-top: none; overflow: hidden; flex-shrink: 0; width: 100%; box-sizing: border-box; }
.machine-stats-band table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.machine-stats-band th { background: #1a1a1a; color: #fff; text-align: center; font-size: 7px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; padding: 2px 1px; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1.4; }
.machine-stats-band th.mach-name-header { width: 96px; text-align: left; padding-left: 5px; }
.machine-stats-band td { border: 1px solid #bbb; text-align: center; font-size: 9px; font-family: 'Barlow Condensed', sans-serif; padding: 2px 1px; background: #fff; }
.machine-stats-band tr th:last-child, .machine-stats-band tr td:last-child { border-right: none; }
.machine-stats-band td.mach-name { text-align: left; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding-left: 5px; background: #e6e6e6; }
/* WAR MACHINE / ALTAR / HANDLER: info body — same as card-middle */
.card-machine-body { display: flex; border-top: 1px solid #1a1a1a; border-bottom: 1px solid #1a1a1a; overflow: hidden; min-height: 150px; flex-shrink: 0; }
.card-machine-info { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
/* HANDLER: pack rows */
.card-packs-section { border-top: 1px solid #aaa; padding: 3px 7px 4px; flex-shrink: 0; }
.card-packs-label { font-family: 'Barlow Condensed', sans-serif; font-size: 7.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 2px; }
.card-pack-row { display: flex; align-items: baseline; font-family: 'Barlow Condensed', sans-serif; font-size: 8px; text-transform: uppercase; letter-spacing: 0.03em; line-height: 1.7; }
.card-pack-name { flex: 1; font-weight: 700; }
.card-pack-size { color: #555; font-weight: 400; white-space: nowrap; }
/* FLAVOUR */
.card-profile-note { border: 2px solid #1a1a1a; border-top: none; padding: 2px 6px 3px; font-size: 7.5px; font-style: italic; color: #fff; font-family: 'Barlow Condensed', sans-serif; background: #1a1a1a; flex-shrink: 0; display: block; }
.card-race-header td { background: #d8d8d8 !important; color: #1a1a1a; font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; text-align: left; padding: 2px 5px !important; border-color: #999 !important; }
.card-beast-list { border-top: 1px solid #1a1a1a; padding: 5px 8px 6px; flex-shrink: 0; }
.card-beast-list-heading { font-family: 'Barlow Condensed', sans-serif; font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; text-align: center; margin-bottom: 4px; }

  buildForm(); render();

}

function addNumericStat(base, mod) {
  const m = base.match(/^(-?\d+)(\+\d+)?$/);
  if (!m) return base;
  return (parseInt(m[1]) + mod) + (m[2] || "");
}

/* ═══ DOM HELPERS ═══ */
function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
function gv(id) { const e = document.getElementById(id); return e ? e.value.trim() : ""; }
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function makeSec(title) {
  const sec = el("div","form-section");
  const t = el("div","form-section-title"); t.textContent = title; sec.appendChild(t);
  const body = el("div","form-section-body"); sec.appendChild(body);
  return sec;
}
function makeField(label, id, type, placeholder, oninput) {
  const field = el("div","form-field");
  if (label) { const lbl = document.createElement("label"); lbl.textContent = label; field.appendChild(lbl); }
  let input;
  if (type === "textarea") { input = document.createElement("textarea"); input.placeholder = placeholder || ""; }
  else { input = document.createElement("input"); input.type = "text"; input.placeholder = placeholder || ""; }
  input.id = id;
  if (oninput) input.oninput = oninput;
  field.appendChild(input);
  return field;
}
function makeBtn(text, onclick) { const b = el("button","add-btn"); b.textContent = text; b.onclick = onclick; return b; }
function makeInfoRow(label, value, rightAlign) {
  const row = el("div","card-info-row");
  const lbl = el("span","card-info-label"); lbl.textContent = label; row.appendChild(lbl);
  const val = el("span", rightAlign ? "card-info-value-right" : "card-info-value"); val.textContent = value; row.appendChild(val);
  return row;
}
function makeSelect(id, options, onchange) {
  const sel = document.createElement("select"); sel.id = id; sel.onchange = onchange;
  sel.style.cssText = "background:#0d0d0d;border:1px solid #3a3a3a;border-radius:2px;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:12px;padding:4px 7px;outline:none;width:100%";
  sel.innerHTML = options; return sel;
}

/* ═══ FORM BUILDER ═══ */
function buildForm() {
  const panel = document.getElementById("form-panel"); panel.innerHTML = "";
  if (cardType === "standard")   buildFormStandard(panel);
  if (cardType === "warmachine") buildFormWarMachine(panel);
  if (cardType === "waraltar")   buildFormWarAltar(panel);
  if (cardType === "handler")    buildFormHandler(panel);
  if (cardType === "chariot")    buildFormChariot(panel);
  if (cardType === "character")  buildFormCharacter(panel);
  buildCompanionSection(panel);
  panel.appendChild(makePointsOverrideSection());
}

function makePointsOverrideSection() {
  const sec = makeSec("Points Override");
  sec.classList.add("form-section-collapsible");
  sec.querySelector(".form-section-title").onclick = () => sec.classList.toggle("open");
  const body = sec.querySelector(".form-section-body");
  const note = document.createElement("div");
  note.style.cssText = "font-size:9px;color:#666;font-family:'Barlow Condensed',sans-serif;padding:2px 0 6px;line-height:1.4";
  note.textContent = "Enter a value to override the calculator. Clear to re-enable auto-calculation.";
  body.appendChild(note);
  const field = el("div","form-field"); field.innerHTML = "<label>Manual points value</label>";
  const inp = document.createElement("input"); inp.type = "text"; inp.id = "f-pts-override";
  inp.placeholder = "eg. 13½";
  inp.style.cssText = "background:#0d0d0d;border:1px solid #3a3a3a;border-radius:2px;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:12px;padding:4px 7px;outline:none;width:100%";
  inp.oninput = () => {
    const val = inp.value.trim();
    if (val) {
      ptsLocked = true;
      const f = document.getElementById("f-pts-display"); if (f) { f.value = val; render(); }
    } else {
      ptsLocked = false;
      // Re-trigger the active calculator so auto-value is restored
      const fns = { standard: calcPoints, warmachine: calcWMPoints, waraltar: calcAltarPoints,
                    handler: calcHandlerPoints, chariot: calcChariotPoints,
                    character: calcCharacterPoints };
      const fn = fns[cardType]; if (fn) fn(); else render();
    }
  };
  field.appendChild(inp); body.appendChild(field);
  return sec;
}

// Companion sheet state (persists across card re-renders)
let companionState = {
  dismissedAuto: new Set(),
  manualRules: [],
  customNotes: ""
};

const STT_RULE_MAP = {
  scouts:      "Scout Rules",
  skirmishers: "Skirmisher Rules",
  berserkers:  "Berserker Rules",
  foresters:   "Forester Rules",
  falconers:   "Falconer Rules",
  flagellants: "Flagellant Rules",
  bombardiers: "Bombardier Rules",
  assassins:   "Assassin Rules",
  handlers:    "Animal Handler Rules"
};

// Card-type-specific race selector IDs (crew/guard race for non-standard types)
const CARD_RACE_IDS = {
  warmachine: "wm-crew-race",
  waraltar:   "f-altar-race",
  handler:    "f-handler-race",
  chariot:    "f-chariot-crew-race"
};
function getRaceValue() {
  const specificId = CARD_RACE_IDS[cardType];
  if (specificId) { const e = document.getElementById(specificId); if (e && e.value) return e.value; }
  const fr = (document.getElementById("f-race")  || {}).value || "";
  const cr = (document.getElementById("ch-race") || {}).value || "";
  return fr || cr;
}
function getRaceName() {
  const specificId = CARD_RACE_IDS[cardType];
  const el = (specificId && document.getElementById(specificId)) ||
             document.getElementById("f-race") || document.getElementById("ch-race");
  if (!el) return "";
  return (el.options[el.selectedIndex]?.text || "").replace(/\s*\(.*\)/,"").trim();
}
function getMountName() {
  const fr = (document.getElementById("f-mount")  || {}).value || "";
  const cr = (document.getElementById("ch-mount") || {}).value || "";
  if (fr) { const p = fr.split("|"); return p[2] || ""; }  // f-mount: cost|type|name
  if (cr) { const p = cr.split("|"); return p[1] || ""; }  // ch-mount: cost|name
  return "";
}
function getCardTypeActive() {
  return cardType || "";
}
function getCharTypeValue() {
  return (document.getElementById("ch-type") || {}).value || "";
}
function getAutoTriggeredRules() {
  const race  = getRaceValue();
  const raceName = getRaceName();
  const mount = getMountName();
  const ct    = getCardTypeActive();
  const chT   = getCharTypeValue();
  const sttRaw = (document.getElementById("f-special") || {}).value || "";
  const stt   = sttRaw.split("|")[1] || "";
  const rules = [];

  // Racial rules — reference pointers or succinct summaries
  if (raceName === "Dwarf" || raceName === "Norse Dwarf" || raceName === "Chaos Dwarf")
    rules.push("Dwarf Racial Rules");
  if (["Goblin","Orc","Half-Orc","Savage Orc","Black Orc","Hobgoblin"].includes(raceName))
    rules.push("Orc & Goblin Racial Rules");
  if (raceName === "Skaven")       rules.push("Skaven Racial Rules");
  if (raceName === "Skeleton" || raceName === "Zombie" || raceName === "Ghoul" ||
      raceName === "Human Slave")  rules.push("Undead Racial Rules");
  if (raceName === "Chaos Warrior" || raceName === "Chaos Marauder" ||
      raceName === "Chaos Thug" || raceName === "Beastman")
    rules.push("Chaos Racial Rules");
  if (raceName === "Dark Elf")     rules.push("Dark Elf Racial Rules");

  // Giant Races — auto-push their bestiary rule entries
  if (raceName === "Giant")      rules.push("Giant Rules");
  if (raceName === "Ogre")       rules.push("Ogre Rules");
  if (raceName === "Troll")      rules.push("Troll Rules");
  if (raceName === "Minotaur")   rules.push("Minotaur Rules");
  if (raceName === "Treeman")    rules.push("Treeman Rules");
  if (raceName === "Troglodyte") rules.push("Troglodyte Rules");

  // Specific bestiary rules
  if (raceName === "Black Orc")    rules.push("Black Orc Animosity");
  if (raceName === "Savage Orc")   rules.push("Savage Orc Frenzy");
  if (race.includes("Rat-Ogre"))   rules.push("Rat-Ogre Fear");
  if (mount === "War Boar")           rules.push("War Boar Gore");
  if (mount === "Ki-rin")             rules.push("Ki-rin Magical Attacks");
  if (mount === "Pegasus")            rules.push("Pegasus Magical Attacks");
  if (mount === "Temple Dog")         rules.push("Temple Dog Rules");
  if (mount === "Unicorn")            rules.push("Unicorn Rules");
  if (mount === "Wild Cat")           rules.push("Wild Cat Rules");
  if (mount === "Wolf-Rat")           rules.push("Wolf-Rat Rules");
  if (mount === "Cold One")           rules.push("Cold One Rules");
  if (mount === "Giant Spider")       rules.push("Giant Spider Rules");
  if (mount === "Great Eagle")        rules.push("Great Eagle Rules");
  if (mount === "Griffon")            rules.push("Griffon Rules");
  if (mount === "Hippogriff")         rules.push("Hippogriff Rules");
  if (mount === "Manticore")          rules.push("Manticore Rules");
  if (mount === "Wyvern")             rules.push("Wyvern Rules");
  if (mount.startsWith("Dragon"))     rules.push("Dragon Rules");
  if (ct === "waraltar")           rules.push("War Altar Rules");
  if (ct === "handler")            rules.push("Animal Handler Rules");
  if (chT === "assassin")          rules.push("Assassin Rules");
  if (STT_RULE_MAP[stt]) rules.push(STT_RULE_MAP[stt]);
  return rules;
}

function buildCompanionSection(panel) {
  const sec = makeSec("Reference Sheet");
  sec.classList.add("form-section-collapsible");
  sec.querySelector(".form-section-title").onclick = () => sec.classList.toggle("open");
  const body = sec.querySelector(".form-section-body");

  const note = document.createElement("div");
  note.style.cssText = "font-size:9px;color:#777;font-family:'Barlow Condensed',sans-serif;line-height:1.5;padding:2px 0 8px";
  note.textContent = "Auto-populates from race, mount, and card type. Prints beside the card.";
  body.appendChild(note);

  // Chips area (populated by renderCompanion)
  const chipsArea = document.createElement("div");
  chipsArea.id = "comp-chips-area";
  chipsArea.style.cssText = "display:flex;flex-wrap:wrap;gap:4px;min-height:24px;margin:8px 0;padding:4px;background:#111;border:1px solid #2a2a2a;border-radius:2px";
  body.appendChild(chipsArea);

  // Add rule from catalogue — auto-adds on selection
  const catWrap = el("div","form-field");
  const catLabel = document.createElement("label"); catLabel.textContent = "Add Rule";
  const catSel = document.createElement("select"); catSel.id = "comp-cat-sel";
  catSel.style.cssText = "background:#0d0d0d;border:1px solid #3a3a3a;border-radius:2px;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:11px;padding:3px 6px;outline:none;width:100%";
  const catGroups = {};
  Object.entries(SPECIAL_RULES_CATALOGUE).forEach(([key, v]) => {
    if (!catGroups[v.category]) catGroups[v.category] = [];
    catGroups[v.category].push(key);
  });
  catSel.innerHTML = '<option value="">— select to add —</option>';
  Object.entries(catGroups).forEach(([cat, keys]) => {
    const og = document.createElement("optgroup"); og.label = cat;
    keys.forEach(k => { const o = document.createElement("option"); o.value = k; o.textContent = k; og.appendChild(o); });
    catSel.appendChild(og);
  });
  catSel.onchange = () => {
    const key = catSel.value; if (!key) return;
    if (!companionState.manualRules.includes(key)) {
      companionState.manualRules.push(key);
      companionState.dismissedAuto.delete(key);
    }
    catSel.value = "";
    renderCompanion();
  };
  catWrap.appendChild(catLabel); catWrap.appendChild(catSel);
  body.appendChild(catWrap);

  // Custom notes
  const notesWrap = el("div","form-field");
  const notesLabel = document.createElement("label"); notesLabel.textContent = "Custom Notes";
  const notesTa = document.createElement("textarea"); notesTa.id = "comp-custom-notes";
  notesTa.placeholder = "Free text — any notes not in the catalogue...";
  notesTa.style.cssText = "width:100%;box-sizing:border-box;min-height:60px;resize:vertical";
  notesTa.value = companionState.customNotes;
  notesTa.oninput = () => { companionState.customNotes = notesTa.value; renderCompanion(); };
  notesWrap.appendChild(notesLabel); notesWrap.appendChild(notesTa);
  body.appendChild(notesWrap);

  // Wiki link row
  const linkRow = document.createElement("div");
  linkRow.style.cssText = "display:flex;gap:6px;align-items:flex-end;margin-top:4px";
  const pagef = el("div","form-field"); pagef.style.flex = "1"; pagef.innerHTML = "<label>Wiki Page</label>";
  const pageSel = document.createElement("select"); pageSel.id = "comp-wiki-page";
  pageSel.style.cssText = "background:#0d0d0d;border:1px solid #3a3a3a;border-radius:2px;color:#e8e8e8;font-family:'Barlow Condensed',sans-serif;font-size:11px;padding:3px 6px;outline:none;width:100%";
  pageSel.innerHTML = `
    <option value="wa-special-rules">Special Rules</option>
    <option value="wa-bestiary">Bestiary</option>
    <option value="ag-characters">Characters</option>
    <option value="wa-magic-items">Magic Items</option>
    <option value="wa-points-formula">Points Formula</option>
    <option value="ag-points-values">Points Values</option>
    <option value="ag-weapons">Weapons</option>
    <option value="ag-missile-weapons">Missile Weapons</option>
    <option value="ag-special-troop-types">Special Troop Types</option>
    <option value="ag-chariots">Chariots</option>
    <option value="ag-aerial">Aerial Movement</option>`;
  pagef.appendChild(pageSel); linkRow.appendChild(pagef);
  const linkBtn = document.createElement("button");
  linkBtn.className = "add-btn wiki-link-btn";
  linkBtn.style.cssText = "width:auto;padding:4px 12px;margin:0;white-space:nowrap;flex-shrink:0";
  linkBtn.textContent = "Open in Wiki \u2197";
  linkBtn.onclick = () => window.open("whfb3 wiki.html#" + pageSel.value, "_blank");
  linkRow.appendChild(linkBtn);
  body.appendChild(linkRow);

  panel.appendChild(sec);
  renderCompanion();
}

function renderCompanion() {
  // Rules that are authoritative — locked to current form state, never dismissible
  const sttKey = ((document.getElementById("f-special") || {}).value || "").split("|")[1] || "";
  const activeSttRule = STT_RULE_MAP[sttKey];
  const ct = getCardTypeActive();
  const chT = getCharTypeValue();
  const lockedRules = new Set();
  if (activeSttRule) lockedRules.add(activeSttRule);
  if (ct === "waraltar") lockedRules.add("War Altar Rules");
  if (ct === "handler")  lockedRules.add("Animal Handler Rules");
  if (chT === "assassin") lockedRules.add("Assassin Rules");
  // Always clear locked rules from dismissedAuto so they re-appear if re-selected
  lockedRules.forEach(r => companionState.dismissedAuto.delete(r));

  const autoTriggered = getAutoTriggeredRules();

  // Update chip display in the form panel
  const chipsArea = document.getElementById("comp-chips-area");
  if (chipsArea) {
    chipsArea.innerHTML = "";
    // Auto chips — locked ones have no ×; others are dismissible
    autoTriggered.filter(k => !companionState.dismissedAuto.has(k) && !companionState.manualRules.includes(k)).forEach(key => {
      const isLocked = lockedRules.has(key);
      const chip = document.createElement("div");
      chip.style.cssText = "display:inline-flex;align-items:center;gap:3px;background:#222;border:1px solid #444;border-radius:2px;padding:2px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#aaa;line-height:1.3";
      chip.innerHTML = `<span>${key}</span>` + (isLocked ? "" : `<span style="cursor:pointer;color:#666;padding:0 2px" title="Dismiss">\u00d7</span>`);
      if (!isLocked) chip.querySelector("span:last-child").onclick = () => { companionState.dismissedAuto.add(key); renderCompanion(); };
      chipsArea.appendChild(chip);
    });
    // Manual chips (gold — removable with ×)
    companionState.manualRules.forEach(key => {
      const chip = document.createElement("div");
      chip.style.cssText = "display:inline-flex;align-items:center;gap:3px;background:#1a1a1a;border:1px solid #8b6914;border-radius:2px;padding:2px 6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:#c8a832;line-height:1.3";
      chip.innerHTML = `<span>${key}</span><span style="cursor:pointer;color:#8b6914;padding:0 2px" title="Remove">\u00d7</span>`;
      chip.querySelector("span:last-child").onclick = () => { companionState.manualRules = companionState.manualRules.filter(r => r !== key); renderCompanion(); };
      chipsArea.appendChild(chip);
    });
    if (chipsArea.children.length === 0) {
      const empty = document.createElement("div");
      empty.style.cssText = "font-size:9px;color:#555;font-family:'Barlow Condensed',sans-serif;padding:6px 4px";
      empty.textContent = "No rules active \u2014 select a race/mount or add a rule below";
      chipsArea.appendChild(empty);
    }
  }

  // Render companion preview pane
  const comp = document.getElementById("companion-preview");
  if (!comp) return;

  const activeAuto = autoTriggered.filter(k => !companionState.dismissedAuto.has(k));
  const allKeys = [...new Set([...activeAuto, ...companionState.manualRules])];
  const hasContent = allKeys.length > 0 || companionState.customNotes.trim();

  comp.classList.toggle("companion-empty", !hasContent);
  comp.innerHTML = "";
  if (!hasContent) return;

  const unitName = (document.getElementById("f-name") || document.getElementById("ch-name") || {}).value || "";
  const hdr = el("div","companion-header");
  hdr.textContent = (unitName || "Unit") + " \u2014 Reference Sheet";
  comp.appendChild(hdr);

  allKeys.forEach(key => {
    const entry = SPECIAL_RULES_CATALOGUE[key];
    if (!entry) return;
    const sec = el("div","companion-section");
    const title = el("div","companion-section-title"); title.textContent = key;
    const body = el("div","companion-body"); body.textContent = entry.text;
    sec.appendChild(title); sec.appendChild(body); comp.appendChild(sec);
  });

  if (companionState.customNotes.trim()) {
    const sec = el("div","companion-section");
    const title = el("div","companion-section-title"); title.textContent = "Notes";
    const body = el("div","companion-body"); body.textContent = companionState.customNotes.trim();
    sec.appendChild(title); sec.appendChild(body); comp.appendChild(sec);
  }
}

// Apply race profile to any profile row by index (row 0 = handler/guard/standard)
function applyProfileFromRace(raceEl, rowIndex) {
  if (!raceEl || !raceEl.value || !RACE_PROFILES[raceEl.value]) return;
  const raceName = raceEl.options[raceEl.selectedIndex].text;
  if (!profileRows[rowIndex]) profileRows[rowIndex] = { label: "", stats: Array(12).fill("–") };
  profileRows[rowIndex].label = raceName;
  profileRows[rowIndex].stats = RACE_PROFILES[raceEl.value].slice();
  buildProfileForms(); render();
}
// Handler race selection: fills race label, profile row, stats, and calculates points
function applyHandlerRace(raceEl) {
  if (!raceEl || !raceEl.value || !RACE_PROFILES[raceEl.value]) return;
  const raceName = raceEl.options[raceEl.selectedIndex].text;
  const raceBase = isNaN(parseFloat(raceEl.value)) ? (NAMED_RACE_COSTS[raceEl.value] || 0) : parseFloat(raceEl.value);
  // Set race label field
  const raceLabelEl = document.getElementById("f-race-label");
  if (raceLabelEl) raceLabelEl.value = raceName;
  // Set handler profile row label + stats
  if (!profileRows[0]) profileRows[0] = { label: "", stats: Array(12).fill("–") };
  profileRows[0].label = "Animal Handler";
  profileRows[0].stats = RACE_PROFILES[raceEl.value].slice();
  // Default packs note if empty
  const packsEl = document.getElementById("f-beasts-note");
  if (packsEl && !packsEl.value) packsEl.value = "Handlers with packs";
  buildProfileForms(); calcHandlerPoints();
}
// Handler points: race base + equipment + 5 surcharge
function calcHandlerPoints() {
  const raceEl = document.getElementById("f-handler-race");
  if (!raceEl || !raceEl.value) { render(); return; }
  const raceBase = isNaN(parseFloat(raceEl.value)) ? (NAMED_RACE_COSTS[raceEl.value] || 0) : parseFloat(raceEl.value);
  const wpnEl  = document.getElementById("f-weapons-handler");
  const armEl  = document.getElementById("f-armour-handler");
  const wpnCost = wpnEl  ? (parseFloat(wpnEl.value.split("|")[0])  || 0) : 0;
  const armCost = armEl  ? (parseFloat(armEl.value.split("|")[0])  || 0) : 0;
  const equipMult = raceBase < 5 ? 0.5 : 1;
  const pts = Math.round((raceBase + (wpnCost + armCost) * equipMult + 5) * 2) / 2;
  const ptsEl = document.getElementById("f-pts-display");
  if (!ptsLocked && ptsEl) ptsEl.value = fractionStr(pts);
  render();
}
// War Altar guards: race + count → profile row label + crew display text
function applyAltarGuards() {
  const raceEl = document.getElementById("f-altar-race");
  const countEl = document.getElementById("f-altar-count");
  if (!raceEl || !raceEl.value) return;
  const raceName = raceEl.options[raceEl.selectedIndex].text;
  const count = (countEl && countEl.value.trim()) ? countEl.value.trim() : "";
  const label = count ? raceName + " (" + count + ")" : raceName;
  if (!profileRows[0]) profileRows[0] = { label: "", stats: Array(12).fill("–") };
  profileRows[0].label = label;
  if (RACE_PROFILES[raceEl.value]) profileRows[0].stats = RACE_PROFILES[raceEl.value].slice();
  buildProfileForms(); render();
}

/* ═══ PROFILE FORMS ═══ */
function buildProfileForms() {
  const container = document.getElementById("profile-rows"); if (!container) return;
  container.innerHTML = "";
  profileRows.forEach((row, ri) => {
    const block = el("div","profile-row-block");
    if (profileRows.length > 1) {
      const rb = document.createElement("button"); rb.className = "profile-row-remove"; rb.textContent = "×";
      rb.onclick = () => { profileRows.splice(ri, 1); buildProfileForms(); render(); }; block.appendChild(rb);
    }
    const lf = el("div","form-field"); lf.innerHTML = "<label>Row Label</label>";
    const li = document.createElement("input"); li.type = "text"; li.value = row.label;
    li.oninput = () => { profileRows[ri].label = li.value; render(); }; lf.appendChild(li); block.appendChild(lf);
    const gl = el("div","stat-grid-labels");
    STAT_KEYS.forEach(k => { const s = el("div","stat-label"); s.textContent = k; gl.appendChild(s); }); block.appendChild(gl);
    const grid = el("div","stat-grid");
    STAT_KEYS.forEach((k, si) => {
      const inp = document.createElement("input"); inp.className = "stat-input"; inp.type = "text";
      inp.value = row.stats[si] || "–";
      inp.oninput = () => { profileRows[ri].stats[si] = inp.value; render(); }; grid.appendChild(inp);
    }); block.appendChild(grid); container.appendChild(block);
  });
}

    resetBtn.style.cssText = "background:#1a1a1a;border:1px solid #3a3a3a;border-radius:2px;color:#666;font-size:9px;padding:0 4px;cursor:pointer;flex-shrink:0;height:22px";
    resetBtn.onmouseenter = () => resetBtn.style.color = "#e8e8e8";

    resetBtn.onclick = () => {

    };
    ciWrap.appendChild(resetBtn); cf.appendChild(ciWrap);
    pr.appendChild(pf); pr.appendChild(cf); block.appendChild(pr);
    // Stats — collapsible, closed by default
    const statsToggle = document.createElement("div");

/* ═══ CALCULATOR (Standard only) ═══ */

/* ════════════════════════════════════════════════════════
   CHARIOT CARD — Form Builder, Calculator & Renderer
   Formula: (crew_pts_each × crew_count + mount_pts_each × mount_count) × 2
            + scythes × 20 (flat, not doubled)
   ════════════════════════════════════════════════════════ */

// Chariot draft mount options: name → { pts, stats[12], flying (bool), flyData [min,max,acc/dec] }
const CHARIOT_MOUNTS = {
  "Horse":        { pts: 3,  stats: ["8","3","0","3","3","1","3","1","–","–","–","–"] },
  "Warhorse":     { pts: 6,  stats: ["8","3","0","4","3","–","3","1","–","–","–","–"] },
  "Giant Wolf":   { pts: 8,  stats: ["9","4","0","3","3","1","3","1","–","–","–","–"] },
  "Giant Boar":   { pts: 16, stats: ["7","4","0","3","4","1","3","1","–","–","–","–"] },
  "Undead Horse": { pts: 10, stats: ["8","2","2","3","3","1","2","1","–","–","–","–"] },
  // Undead Horse: 10pts. Validated: Skeleton(10)+LA(2) crew×2, UndHorse(10)×2 → 88pts ✓
  // Flying mounts — auto-enable flying profile on selection
  "Great Eagle":  { pts: 75,  flying: true, flyData: ["6″","36″","12″"], stats: ["–","5","0","4","4","3","5","2","8","7","8","8"] },
  "Pegasus":      { pts: 40,  flying: true, flyData: ["6″","24″","8″"],  stats: ["8","3","0","4","3","2","4","2","7","5","8","8"] },
  "Griffon":      { pts: 200, flying: true, flyData: ["6″","24″","6″"],  stats: ["6","5","0","6","5","4","5","4","7","6","8","8"] },
  "Wyvern":       { pts: 180, flying: true, flyData: ["6″","18″","6″"],  stats: ["4","4","0","7","6","5","3","4","7","5","7","7"] },
};

function calcChariotPoints() {
  const crewRaceEl = document.getElementById("f-chariot-crew-race");
  const crewCountEl = document.getElementById("f-chariot-crew-count");
  const mountEl = document.getElementById("f-chariot-mount");
  const mountCountEl = document.getElementById("f-chariot-mount-count");
  const scythesEl = document.getElementById("f-chariot-scythes");
  const ptsEl = document.getElementById("f-pts-display");
  const resultEl = document.getElementById("chariot-pts-result");
  const breakdownEl = document.getElementById("chariot-pts-breakdown");

  if (!crewRaceEl || !mountEl) return;

  const crewBase = isNaN(parseFloat(crewRaceEl.value)) ? (NAMED_RACE_COSTS[crewRaceEl.value] || 0) : (parseFloat(crewRaceEl.value) || 0);
  const crewCount = parseInt(crewCountEl?.value) || 1;
  const mountData = CHARIOT_MOUNTS[mountEl.value];
  const mountPts = mountData ? mountData.pts : 0;
  const mountCount = parseInt(mountCountEl?.value) || 1;
  const scythes = scythesEl?.checked ? 20 : 0;

  // Read equipment from chariot-specific selects
  const wpnEl = document.getElementById("f-chariot-weapons");
  const wpn2El = document.getElementById("f-chariot-weapons2");
  const armEl = document.getElementById("f-chariot-armour");
  const wpnCost = parseFloat(wpnEl?.value.split("|")[0]) || 0;
  const wpn2Cost = parseFloat(wpn2El?.value.split("|")[0]) || 0;
  const armCost = parseFloat(armEl?.value.split("|")[0]) || 0;
  // Sub-5 base triggers ×½ equipment multiplier (same rule as infantry)
  const equipMult = crewBase < 5 ? 0.5 : 1;
  const crewPtsEach = crewBase + (wpnCost + wpn2Cost + armCost) * equipMult;

  if (!crewBase && !mountPts) {
    if (resultEl) resultEl.textContent = "—";
    if (breakdownEl) breakdownEl.innerHTML = "Select crew race and mount to calculate.";
    return;
  }

  const crewTotal = crewPtsEach * crewCount;
  const mountTotal = mountPts * mountCount;
  const doubled = (crewTotal + mountTotal) * 2;
  const total = Math.round((doubled + scythes) * 2) / 2;

  if (resultEl) resultEl.textContent = fractionStr(total);
  if (!ptsLocked && ptsEl) { ptsEl.value = fractionStr(total); }

  // Auto-sync card display fields from calculator selectors (unless user has manually edited them)
  const cardWpnEl = document.getElementById("f-card-weapons");
  const cardArmEl = document.getElementById("f-card-armour");
  if (cardWpnEl && !cardWpnEl.dataset.manual) {
    const wpn2Label = wpn2El?.value.split("|")[1] || "";
    const wpnLabel  = wpnEl?.value.split("|")[1]  || "Hand Weapon";
    cardWpnEl.value = (wpn2Label ? wpn2Label : "") + wpnLabel;
  }
  if (cardArmEl && !cardArmEl.dataset.manual) {
    cardArmEl.value = armEl?.value.split("|")[1] || "None";
  }

  render();
  if (breakdownEl) {
    let html = `Crew: ${fractionStr(crewPtsEach)} × ${crewCount} = ${fractionStr(crewTotal)}<br>`;
    html += `Mount: ${mountPts} × ${mountCount} = ${fractionStr(mountTotal)}<br>`;
    html += `(${fractionStr(crewTotal)} + ${fractionStr(mountTotal)}) × 2 = ${fractionStr(doubled)}<br>`;
    if (scythes) html += `+ Scythes: ${scythes}<br>`;
    breakdownEl.innerHTML = html;
  }
}

function updateChariotMountProfile() {
  const mountEl = document.getElementById("f-chariot-mount");
  const mountCountEl = document.getElementById("f-chariot-mount-count");
  if (!mountEl) return;
  const mountName = mountEl.value;
  const mountData = CHARIOT_MOUNTS[mountName];
  const count = parseInt(mountCountEl?.value) || 2;
  if (!profileRows[1]) profileRows[1] = { label: "", stats: Array(12).fill("–") };
  profileRows[1].label = `${mountName} (${count})`;
  profileRows[1].stats = mountData ? mountData.stats.slice() : Array(12).fill("–");
  buildProfileForms();
  // Flying mount: auto-populate flying profile section if present in this form
  if (mountData && mountData.flying && mountData.flyData) {
    setTimeout(() => {
      const chk = document.getElementById("f-fly-enabled");
      const flyFields = document.getElementById("fly-fields");
      const flySec = chk && chk.closest(".form-section-collapsible");
      if (chk) { chk.checked = true; flyingProfile.enabled = true; }
      if (flyFields) flyFields.style.display = "block";
      if (flySec) flySec.classList.add("open");
      ["f-fly-min","f-fly-max","f-fly-accdec"].forEach((id, i) => {
        const inp = document.getElementById(id);
        if (inp) { inp.value = mountData.flyData[i]; flyingProfile[["min","max","accdec"][i]] = mountData.flyData[i]; }
      });
      render();
    }, 0);
  } else if (mountData && !mountData.flying) {
    // Non-flying: clear flying profile
    setTimeout(() => {
      const chk = document.getElementById("f-fly-enabled");
      const flyFields = document.getElementById("fly-fields");
      const flySec = chk && chk.closest(".form-section-collapsible");
      if (chk) { chk.checked = false; flyingProfile.enabled = false; }
      if (flyFields) flyFields.style.display = "none";
      if (flySec) flySec.classList.remove("open");
      ["f-fly-min","f-fly-max","f-fly-accdec"].forEach(id => {
        const inp = document.getElementById(id); if (inp) inp.value = "";
      });
      flyingProfile.min = ""; flyingProfile.max = ""; flyingProfile.accdec = "";
      render();
    }, 0);
  } else {
    render();
  }
}

function fractionStr(n) {
  const whole = Math.floor(n); const frac = n - whole;
  if (frac === 0) return String(whole);
  if (frac === 0.5) return (whole === 0 ? "" : whole) + "½";
  return n.toFixed(2);
}
function calcPoints() {
  const raceEl = document.getElementById("f-race"); if (!raceEl) return;
  const raceVal = isNaN(parseFloat(raceEl.value)) ? (NAMED_RACE_COSTS[raceEl.value] || 0) : parseFloat(raceEl.value);
  const eliteRaw = document.getElementById("f-elite").value.split("|");
  const eliteVal = parseFloat(eliteRaw[0]);
  const specialVal = parseFloat((document.getElementById("f-special").value || "0").split("|")[0]) || 0;
  const wpnParts = document.getElementById("f-weapons").value.split("|");
  const wpn2Parts = document.getElementById("f-weapons2").value.split("|");
  const armParts = document.getElementById("f-armour").value.split("|");
  const mntParts = document.getElementById("f-mount").value.split("|");
  const wpnCost = parseFloat(wpnParts[0]) || 0; const wpn2Cost = parseFloat(wpn2Parts[0]) || 0;
  const armCost = parseFloat(armParts[0]) || 0; const mntCost = parseFloat(mntParts[0]) || 0;
  const mntType = mntParts[1];
  if (isNaN(raceVal)) { document.getElementById("pts-result").textContent = "—"; document.getElementById("pts-breakdown").textContent = "Select a base race to calculate."; return; }
  let effectiveBase = Math.max(raceVal + eliteVal, 1);
  const equipMultiplier = raceVal < 5 ? 0.5 : 1;
  const equipCost = (wpnCost + wpn2Cost + armCost) * equipMultiplier;
  let pts, breakdown;
  if (mntType === "none") {
    pts = effectiveBase + equipCost + specialVal;
    breakdown = buildBreakdown([["Base",raceVal],eliteVal!==0?["Elite/Levy modifier",eliteVal]:null,equipCost>0?[`Equipment (x${equipMultiplier})`,equipCost]:null,specialVal>0?["Special surcharge",specialVal]:null]);
  } else if (mntType === "move") {
    if (effectiveBase <= 10) {
      const rt = effectiveBase + equipCost + specialVal; pts = rt * 2;
      breakdown = buildBreakdown([["Base",raceVal],eliteVal!==0?["Elite/Levy modifier",eliteVal]:null,equipCost>0?[`Equipment (x${equipMultiplier})`,equipCost]:null,specialVal>0?["Special surcharge",specialVal]:null,["x 2 (mounted)",null]],rt,true);
    } else { pts = effectiveBase + equipCost + specialVal + mntCost; breakdown = buildBreakdown([["Base",raceVal],eliteVal!==0?["Elite/Levy modifier",eliteVal]:null,equipCost>0?[`Equipment (x${equipMultiplier})`,equipCost]:null,specialVal>0?["Special surcharge",specialVal]:null,["Mount (direct add)",mntCost]]); }
  } else {
    const halfMount = mntCost / 2;
    if (effectiveBase <= 10) {
      const rt = effectiveBase + equipCost + specialVal; pts = rt * 2 + halfMount;
      breakdown = buildBreakdown([["Base",raceVal],eliteVal!==0?["Elite/Levy modifier",eliteVal]:null,equipCost>0?[`Equipment (x${equipMultiplier})`,equipCost]:null,specialVal>0?["Special surcharge",specialVal]:null,["x 2 (mounted)",null],[`+ half mount value (${mntCost}/2)`,halfMount]],rt,true,halfMount);
    } else { pts = effectiveBase + equipCost + specialVal + mntCost; breakdown = buildBreakdown([["Base",raceVal],eliteVal!==0?["Elite/Levy modifier",eliteVal]:null,equipCost>0?[`Equipment (x${equipMultiplier})`,equipCost]:null,specialVal>0?["Special surcharge",specialVal]:null,["Mount (direct add)",mntCost]]); }
  }
  pts = Math.ceil(pts * 2) / 2;
  document.getElementById("pts-result").textContent = fractionStr(pts);
  document.getElementById("pts-breakdown").innerHTML = breakdown;
  if (!ptsLocked) { const f = document.getElementById("f-pts-display"); if (f) { f.value = fractionStr(pts); render(); } }
  syncRiderCost();
}
function buildBreakdown(lines, riderTotal, doubled, halfMount) {
  let html = "";
  for (const line of lines) {
    if (!line) continue; const [label, val] = line;
    if (val === null) { html += `<span style="color:#e8e8e8">(${fractionStr(riderTotal)}) x 2 = ${fractionStr(riderTotal*2)}</span><br>`; }
    else { const sign = val < 0 ? "" : (html ? "+" : ""); html += `${label}: ${sign}${fractionStr(val)}<br>`; }
  }
  if (halfMount) html += `+ ${fractionStr(halfMount)} (half mount)<br>`;
  return html;
}

      this.remove();

      const box = document.getElementById("artBox");
      if (box) { box.style.padding = "0"; box.style.cursor = "default"; box.appendChild(img); }
    };
    reader.readAsDataURL(file);
  });
}


/* ═══ WAR ALTAR CALCULATOR ═══ */
function calcAltarPoints() {
  const raceEl = document.getElementById("f-altar-race");
  const countEl = document.getElementById("f-altar-count");
  const wpnEl  = document.getElementById("f-altar-wpn");
  const armEl  = document.getElementById("f-altar-armsel");
  const resEl  = document.getElementById("altar-pts-result");
  const brkEl  = document.getElementById("altar-pts-breakdown");
  if (!resEl) return;
  if (!raceEl || !raceEl.value || !countEl || !countEl.value.trim()) {
    resEl.textContent = "—"; if (brkEl) brkEl.textContent = "Select guard race and count."; return;
  }
  const raceCost = isNaN(parseFloat(raceEl.value)) ? (NAMED_RACE_COSTS[raceEl.value] || 0) : (parseFloat(raceEl.value) || 0);
  const count    = parseInt(countEl.value.trim()) || 0;
  const wpnCost  = wpnEl  ? (parseFloat(wpnEl.value.split("|")[0])  || 0) : 0;
  const armCost  = armEl  ? (parseFloat(armEl.value.split("|")[0])  || 0) : 0;
  const equipMult = raceCost < 5 ? 0.5 : 1;
  const guardPerModel = raceCost + (wpnCost + armCost) * equipMult;
  const guardsTotal   = guardPerModel * count;
  const total = Math.ceil((50 + guardsTotal) * 2) / 2;
  resEl.textContent = fractionStr(total);
  if (brkEl) brkEl.innerHTML =
    `Altar base: 50<br>` +
    `Guards (${count} × ${fractionStr(guardPerModel)}): ${fractionStr(guardsTotal)}<br>` +
    `<span style="color:#666;font-size:9px">${fractionStr(raceCost)} base + ${fractionStr((wpnCost+armCost)*equipMult)} equip</span>`;
  // Auto-fill weapons/armour display fields
  if (wpnEl) { const w = document.getElementById("f-weapons-altar"); if (w) w.value = wpnEl.value.split("|")[1] || "Hand Weapon"; }
  if (armEl) { const a = document.getElementById("f-armour-altar"); if (a) a.value = armEl.value.split("|")[1] || "None"; }
  if (!ptsLocked) { const altarPtsEl = document.getElementById("f-pts-display"); if (altarPtsEl) altarPtsEl.value = fractionStr(total); }
  render();
}

/* Rebuild the machine stat grid (labels + inputs) to match the given headers.
   vals[] (optional) pre-fills the inputs; otherwise retains existing machineStats.statCols values. */
function rebuildMachStatGrid(headers, vals) {
  const container = document.getElementById("mach-stat-container");
  if (!container) return;
  container.innerHTML = "";
  const colCount = headers.length;
  const colStyle = `repeat(${colCount}, 1fr)`;

  const glabels = el("div","machine-stat-grid-labels");
  glabels.style.gridTemplateColumns = colStyle;
  headers.forEach(k => { const s = el("div","stat-label"); s.textContent = k; glabels.appendChild(s); });
  container.appendChild(glabels);

  const grid = el("div","machine-stat-grid");
  grid.style.gridTemplateColumns = colStyle;
  // Initialise cols array
  machineStats.statHeaders = headers;
  if (!machineStats.statCols || machineStats.statCols.length !== colCount) {
    machineStats.statCols = headers.map((_, i) => (vals && vals[i] !== undefined ? vals[i] : ""));
  } else if (vals) {
    vals.forEach((v, i) => { machineStats.statCols[i] = v; });
  }
  headers.forEach((h, i) => {
    const inp = document.createElement("input"); inp.className = "machine-stat-input"; inp.type = "text";
    inp.value = machineStats.statCols[i] || "";
    inp.oninput = () => { machineStats.statCols[i] = inp.value; render(); };
    grid.appendChild(inp);
  });
  container.appendChild(grid);

  // Sync preset selector if present
  const presetSel = document.getElementById("wm-stat-preset");
  if (presetSel) {
    if (headers === WM_STATS_HEADERS_STONE) presetSel.value = "stone";
    else if (headers === WM_STATS_HEADERS_CANNON) presetSel.value = "cannon";
    else presetSel.value = "4";
  }
}

function calcWMPoints() {
  const typeEl = document.getElementById("wm-type");
  const raceEl = document.getElementById("wm-crew-race");
  const wpnEl  = document.getElementById("wm-crew-wpn");
  const armEl  = document.getElementById("wm-crew-arm");

  // Always update machine name and stats if type is selected
  if (typeEl && typeEl.value) {
    const typeLabel = typeEl.options[typeEl.selectedIndex].text.replace(/\s*\(.*\)$/, "").trim();
    const machNameEl = document.getElementById("wm-mach-name");
    if (machNameEl) { machNameEl.value = typeLabel; machineStats.name = typeLabel; }
    // Populate machine stat fields from lookup — rebuild dynamic grid
    const stats = WM_STATS[typeEl.value];
    if (stats) {
      machineStats.statCols = stats.cols.slice(); // mutable copy
      rebuildMachStatGrid(stats.headers, stats.cols);
      // Auto-open Machine Statistics section so user can see auto-filled values
      const machStatSec = document.getElementById("mach-stat-container")?.closest(".form-section-collapsible");
      if (machStatSec) machStatSec.classList.add("open");
    }
  }

  // Always update crew profile label and stats if both type and race are selected
  if (typeEl && typeEl.value && raceEl && raceEl.value) {
    const typeParts = typeEl.value.split("|");
    const crewCount = parseInt(typeParts[1]);
    const raceLabel = raceEl.options[raceEl.selectedIndex].text.replace(/\s*\(.*\)/, "").trim();
    const crewLabel = raceLabel + " (" + crewCount + ")";
    profileRows[0].label = crewLabel;
    // Populate stats from race profile
    if (RACE_PROFILES[raceEl.value]) {
      profileRows[0].stats = RACE_PROFILES[raceEl.value].slice();
    }
    buildProfileForms();
  }

  // Always update weapons and armour display from selected loadout
  if (wpnEl) {
    const wpnMap = { "0":"Hand Weapon", "1":"Additional Hand Weapon",
      "2":"Halberd / Double-handed", "3":"Crossbow", "4":"Repeating Crossbow" };
    const wpnField = document.getElementById("f-weapons-crew");
    if (wpnField) wpnField.value = wpnMap[wpnEl.value] || "Hand Weapon";
  }
  if (armEl) {
    const armMap = { "0":"None", "1":"Shield", "2":"Light Armour", "3":"Light Armour & Shield" };
    const armField = document.getElementById("f-armour-crew");
    if (armField) armField.value = armMap[armEl.value] || "None";
  }

  // Calculate points if both type and race are set
  if (!typeEl || !typeEl.value || !raceEl || !raceEl.value) {
    const r = document.getElementById("wm-pts-result");
    const b = document.getElementById("wm-pts-breakdown");
    if (r) r.textContent = "—";
    if (b) b.textContent = "Select machine type and crew race.";
    render();
    return;
  }

  const typeParts   = typeEl.value.split("|");
  const crewCount   = parseInt(typeParts[1]);
  const machineBase = parseInt(typeParts[2]);
  const noSurcharge = typeParts[3] === "0";
  const surcharge   = noSurcharge ? 0 : 5;
  const raceCost    = parseFloat(raceEl.value);
  const wpnCost     = parseFloat(wpnEl.value) || 0;
  const armCost     = parseFloat(armEl.value) || 0;
  const equipMult   = raceCost < 5 ? 0.5 : 1;
  const crewPerModel = raceCost + (wpnCost + armCost) * equipMult + surcharge;
  const crewTotal   = crewPerModel * crewCount;
  const total       = Math.ceil((machineBase + crewTotal) * 2) / 2;

  document.getElementById("wm-pts-result").textContent = fractionStr(total);
  const surchargeNote = noSurcharge
    ? `<span style="color:#aaa;font-size:9px">crew = ${fractionStr(raceCost)} base + ${fractionStr((wpnCost+armCost)*equipMult)} equip (no surcharge)</span>`
    : `<span style="color:#aaa;font-size:9px">crew = ${fractionStr(raceCost)} base + ${fractionStr((wpnCost+armCost)*equipMult)} equip + 5 surcharge</span>`;
  document.getElementById("wm-pts-breakdown").innerHTML =
    `Machine base: ${machineBase}<br>` +
    `Crew (${crewCount} × ${fractionStr(crewPerModel)}): ${fractionStr(crewTotal)}<br>` +
    surchargeNote;
  if (!ptsLocked) { const wmPtsEl = document.getElementById("f-pts-display"); if (wmPtsEl) wmPtsEl.value = fractionStr(total); }
  render();
}

/* ═══ CHARACTER CARD ═══════════════════════════════════════════════════════
   Formula (ag-characters + WA override):
     Base ≤ 10:  char_base = race_base × (level + 1)
     Base > 10:  char_base = (10 × level) + race_base
   Equipment & mount: added at face value (WA override — no multipliers)
   Wizard surcharge: +30 (L5), +30 (L10), +75 (L15), +135 (L20), +210 (L25)
   Named undead types use fixed lookup tables from army lists.
   Standard advances (competitive, roll 1 on each table) applied to base profile.
═══════════════════════════════════════════════════════════════════════════ */

// Standard advances per level (roll 1 = competitive standard)
// Indices: M WS BS S T W I A Ld Int Cl WP
const CHAR_ADVANCES = {
  5:  [0,+1,+1,+1, 0, 0,+1,+1, 0, 0, 0, 0],
  10: [0,+2,+1,+1,+1,+1,+1,+2,+1, 0, 0, 0],
  15: [0,+2,+1,+1,+1,+2,+2,+2,+2, 0,+1,+1],
  20: [0,+3,+1,+1,+1,+3,+3,+3,+3, 0,+1,+1],
  25: [0,+3,+2,+1,+1,+3,+3,+3,+3,+2,+2,+2]
};

// Wizard surcharge per level (validated against DE, WE, HE, Empire, Bretonnia, Undead)
const WIZARD_SURCHARGE = { 5: 30, 10: 30, 15: 75, 20: 135, 25: 210 };

// Named undead character types: base pts cost per level (from WA Undead army list)
const CHAR_NAMED_COSTS = {
  "Undead Hero":   {5:30,  10:55,  15:85,  20:105, 25:130},
  "Liche":         {5:90,  10:140, 15:235, 20:345, 25:460},
  "Vampire":       {5:330, 10:380, 15:475, 20:585, 25:690},
  "Necromancer":   {5:60,  10:85,  15:155, 20:240, 25:340}
};

// Base profiles for named undead types (sourced from WA Undead army list profiles)
const CHAR_NAMED_PROFILES = {
  "Undead Hero":  ["4","3","3","4","3","1","3","2","7","7","7","7"],
  "Liche":        ["4","3","2","4","3","1","2","1","7+3","8+1","8+3","8+1"],
  "Vampire":      ["4","6","6","6","6","4","6","4","7","8","8","8"],
  "Necromancer":  ["4","4","3","4","3","1","3","1","7","8+1","8+1","8+1"]
};

// Race base costs for named types that don't parse as a float
const CHAR_RACE_BASE = {
  "Undead Hero": null, "Liche": null, "Vampire": null, "Necromancer": null,
  "Human Slave": 4, "Zombie": 4, "Ghoul": 8, "Mummy": 80,
  "Skeleton": 10, "Undead Horseman": 20,
  "Savage Orc": 5.5, "Black Orc": 7, "Slann": 7, "Slann Levy": 5,
  "Lizardman": 20
};

function calcCharacterPoints() {
  const raceEl   = document.getElementById("ch-race");
  const levelEl  = document.getElementById("ch-level");
  const typeEl   = document.getElementById("ch-type");
  const wpnEl    = document.getElementById("ch-weapons");
  const armEl    = document.getElementById("ch-armour");
  const mntEl    = document.getElementById("ch-mount");
  const magicEl  = document.getElementById("ch-magic-pts");
  const resEl    = document.getElementById("ch-pts-result");
  const brkEl    = document.getElementById("ch-pts-breakdown");
  if (!raceEl || !levelEl || !resEl) return;

  const raceName = raceEl.options[raceEl.selectedIndex]?.text || "";
  const raceKey  = raceEl.value;
  const level    = parseInt(levelEl.value) || 5;
  const isWizard = typeEl && typeEl.value === "wizard";

  let charBase = 0;
  let breakdown = "";
  const isNamed = CHAR_NAMED_COSTS[raceName];

  if (isNamed) {
    charBase = CHAR_NAMED_COSTS[raceName][level] || 0;
    breakdown = `${raceName} level ${level}: ${charBase}<br>`;
  } else {
    const raceBase = CHAR_RACE_BASE[raceKey] !== undefined
      ? CHAR_RACE_BASE[raceKey]
      : (parseFloat(raceKey) || 0);
    if (!raceBase) { resEl.textContent = "—"; brkEl.textContent = "Select a race."; return; }
    charBase = raceBase <= 10
      ? raceBase * (level + 1)
      : (10 * level) + raceBase;
    const formula = raceBase <= 10
      ? `${fractionStr(raceBase)} × (${level}+1) = ${fractionStr(charBase)}`
      : `(10 × ${level}) + ${fractionStr(raceBase)} = ${charBase}`;
    breakdown = `Character base (${formula})<br>`;
  }

  const wpnCost  = parseFloat((wpnEl  || {value:"0|"}).value.split("|")[0]) || 0;
  const armCost  = parseFloat((armEl  || {value:"0|"}).value.split("|")[0]) || 0;
  const mntCost  = parseFloat((mntEl  || {value:"0|"}).value.split("|")[0]) || 0;
  const magicCost = parseFloat((magicEl || {value:""}).value) || 0;
  const wizardSurcharge = isWizard ? (WIZARD_SURCHARGE[level] || 0) : 0;

  const equipTotal = wpnCost + armCost;
  if (equipTotal) breakdown += `Equipment (face value): +${fractionStr(equipTotal)}<br>`;
  if (mntCost)    breakdown += `Mount (face value): +${mntCost}<br>`;
  if (wizardSurcharge) breakdown += `Wizard surcharge (level ${level}): +${wizardSurcharge}<br>`;
  if (magicCost)  breakdown += `Magic items: +${magicCost}<br>`;

  const total = charBase + equipTotal + mntCost + wizardSurcharge + magicCost;
  resEl.textContent = fractionStr(total);
  brkEl.innerHTML = breakdown;
  if (!ptsLocked) { const chPtsEl = document.getElementById("f-pts-display"); if (chPtsEl) { chPtsEl.value = fractionStr(total); } }
  render();
}

function applyCharacterProfile() {
  const raceEl  = document.getElementById("ch-race");
  const levelEl = document.getElementById("ch-level");
  if (!raceEl || !levelEl) return;
  const raceKey  = raceEl.value;
  const raceName = raceEl.options[raceEl.selectedIndex]?.text || "";
  const level    = parseInt(levelEl.value) || 5;

  let baseStats = null;
  if (CHAR_NAMED_PROFILES[raceName]) {
    baseStats = CHAR_NAMED_PROFILES[raceName].slice();
  } else if (RACE_PROFILES[raceKey]) {
    baseStats = RACE_PROFILES[raceKey].map(Number);
  }
  if (!baseStats) return;

  const advances = CHAR_ADVANCES[level] || Array(12).fill(0);
  const finalStats = baseStats.map((v, i) => {
    const adv = advances[i];
    if (!adv) return String(v);
    // Handle bonus notation like "8+1"
    const m = String(v).match(/^(-?\d+)(\+\d+)?$/);
    if (!m) return String(v);
    const result = parseInt(m[1]) + adv;
    return (m[2] ? result + m[2] : String(result));
  });

  profileRows[0] = { label: raceName, stats: finalStats };
  buildProfileForms(); render();
  calcCharacterPoints();
}

  const info = el("div","card-info");
  if (level)    info.appendChild(makeInfoRow("Level:", level, true));
  if (charType) info.appendChild(makeInfoRow("Type:", charType));
  if (pts)      info.appendChild(makeInfoRow("Points:", pts, true));
  if (wpnLabel && wpnLabel !== "Hand Weapon") info.appendChild(makeInfoRow("Weapons:", wpnLabel));
  if (armLabel && armLabel !== "None")         info.appendChild(makeInfoRow("Armour:", armLabel));
  if (mntLabel && !mntLabel.startsWith("None")) info.appendChild(makeInfoRow("Mount:", mntLabel));
  if (magicLbl) info.appendChild(makeInfoRow("Magic Items:", magicLbl));
  if (abilitiesLbl) info.appendChild(makeInfoRow("Abilities:", abilitiesLbl));
  makeOptionsBlock(info);
  mid.appendChild(info); card.appendChild(mid);

  makeFlavour(card);
  attachArtUpload();
}


/* ═══ PREVIEW SCALING ═══ */
function scalePreview() {
  const panel   = document.getElementById("preview-panel");
  const outer   = document.getElementById("card-scale-outer");
  const wrapper = document.getElementById("card-scale-wrapper");
  if (!panel || !outer || !wrapper) return;

  // Reset to measure natural card dimensions
  wrapper.style.transform = "";
  outer.style.width  = "";
  outer.style.height = "";

  const naturalW = wrapper.offsetWidth;
  const naturalH = wrapper.offsetHeight;
  if (!naturalW || !naturalH) return;

  const availableW = panel.clientWidth  - 80; // 40px padding each side
  const availableH = panel.clientHeight - 80;

  // Contain: fit within both axes, max 2.5× natural size
  const scale = Math.min(availableW / naturalW, availableH / naturalH, 2.5);

  // Size the outer so the panel centres it correctly, then scale the inner
  outer.style.width  = `${naturalW * scale}px`;
  outer.style.height = `${naturalH * scale}px`;
  wrapper.style.transformOrigin = "top left";
  wrapper.style.transform = `scale(${scale})`;
}

new ResizeObserver(scalePreview).observe(document.getElementById("preview-panel") || document.body);

/* ═══ ARMY LIST ═══ */
function addToArmyList() {
  const card = document.getElementById("card-preview");
  if (!card || !card.innerHTML.trim()) return;
  const label = (document.getElementById("f-name")?.value || "Unnamed Unit").trim();
  // Strip file inputs so stored HTML is clean
  const clone = card.cloneNode(true);
  clone.removeAttribute("id");
  clone.querySelectorAll("input[type='file']").forEach(i => i.remove());
  const html = clone.outerHTML;
  const list = JSON.parse(localStorage.getItem("wfb3-army-list") || "[]");
  list.push({ id: Date.now(), label, html });
  localStorage.setItem("wfb3-army-list", JSON.stringify(list));
  const toast = document.getElementById("army-toast");
  if (toast) {
    toast.textContent = "\u2713 \u201c" + label + "\u201d added \u2014 " + list.length + " card" + (list.length !== 1 ? "s" : "") + " in list";
    toast.style.display = "block";
    toast.style.opacity = "1";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => { toast.style.display = "none"; }, 300); }, 2500);
  }
}

/* INIT */
buildForm(); render();
